<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Boards | Premium To-Do</title>
    <meta name="description" content="Manage multiple to-do lists with a premium horizontal board experience.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="background-glow"></div>
    <main class="boards-wrapper">
        <div id="boards-container" class="boards-container">
            <!-- Boards will be injected here -->
            <div id="add-board-card" class="board-card add-card">
                <button id="add-board-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    <span>New Board</span>
                </button>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
